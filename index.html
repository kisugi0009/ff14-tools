<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINAL FANTASY XIV Tools</title>
    <style>
        :root {
            --accent-color: #a2d2ff;
            --bg-dark: #0e1117;
            --text-muted: #8b949e;
            --signature-color: rgba(162, 210, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-dark);
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            color: var(--accent-color);
            overflow: hidden;
        }

        #menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #161b22 0%, #0e1117 100%);
            position: absolute;
            top: 0; left: 0;
            z-index: 50;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
            font-weight: 300;
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-align: center;
        }

        .btn-group { 
            display: flex; 
            gap: 20px; 
            transition: all 0.5s ease;
        }

        .nav-btn {
            padding: 15px 35px;
            border: 1.5px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(162, 210, 255, 0.15);
            box-shadow: 0 0 20px rgba(162, 210, 255, 0.3);
            transform: scale(1.1);
        }

        .btn-group:hover { gap: 40px; }

        .footer-signature {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            color: var(--signature-color);
            letter-spacing: 1px;
            font-weight: 300;
            text-align: center;
            width: 90%;
            line-height: 1.6;
        }

        #app-frame {
            display: none;
            width: 100%; height: 100vh; border: none;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* 🚀 修正後的 HOME 按鈕：純線條風格 */
        #back-btn {
            position: fixed; 
            top: 20px; 
            left: 20px;
            display: none; 
            padding: 8px 18px;
            background: transparent; /* 確保無底色 */
            border: 1px solid var(--text-muted); /* 僅線條 */
            color: var(--text-muted); 
            border-radius: 20px;
            cursor: pointer; 
            z-index: 1000;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }
        
        #back-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: rgba(162, 210, 255, 0.05); /* 輕微透色 */
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; letter-spacing: 4px; }
            .subtitle { font-size: 0.8rem; margin-bottom: 30px; }
            .btn-group { flex-direction: column; width: 100%; align-items: center; gap: 15px; }
            .nav-btn { width: 80%; padding: 12px 20px; }
            .btn-group:hover { gap: 15px; }
            .nav-btn:hover { transform: none; }
            .footer-signature { font-size: 0.7rem; }

            /* 手機版：移動到右下角 */
            #back-btn {
                top: auto; left: auto;
                bottom: 25px; right: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>FINAL FANTASY XIV Tools</h1>
        <div class="subtitle">做好玩的小工具們</div>
        
        <div class="btn-group">
            <button class="nav-btn" onclick="loadApp('https://kisugi0009-ffxiv-richmaker.hf.space')">發家致富計算機</button>
            <button class="nav-btn" style="opacity: 0.4; cursor: default;">想到再說ᕕ( ᐛ )ᕗ</button>
        </div>

        <div class="footer-signature">
            Developed by @鳳凰 時偃｜寫給自己玩的，不能保證正確，斟酌使用(･ω´･ )
        </div>
    </div>

    <button id="back-btn" onclick="goHome()">HOME</button>
    <iframe id="app-frame" src=""></iframe>

    <script>
        function loadApp(url) {
            document.getElementById('menu-container').style.display = 'none';
            const frame = document.getElementById('app-frame');
            frame.style.display = 'block';
            frame.src = url;
            document.getElementById('back-btn').style.display = 'block';
        }

        function goHome() {
            document.getElementById('menu-container').style.display = 'flex';
            const frame = document.getElementById('app-frame');
            frame.style.display = 'none';
            frame.src = '';
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
</body>
</html>
