<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL FANTASY XIV Tools</title>
    <style>
        :root {
            --accent-color: #a2d2ff;
            --bg-dark: #0e1117;
            --text-muted: #8b949e;
            --signature-color: rgba(162, 210, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-dark);
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            color: var(--accent-color);
            overflow: hidden;
        }

        #menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(180deg, #161b22 0%, #0e1117 100%);
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        .btn-group { 
            display: flex; 
            gap: 20px; 
            transition: all 0.5s ease;
            z-index: 10;
        }

        .nav-btn {
            padding: 15px 35px;
            border: 1.5px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(162, 210, 255, 0.15);
            box-shadow: 0 0 20px rgba(162, 210, 255, 0.3);
            transform: scale(1.1);
            padding-left: 45px;
            padding-right: 45px;
        }

        .btn-group:hover {
            gap: 40px; 
        }

        .footer-signature {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            color: var(--signature-color);
            letter-spacing: 1px;
            font-weight: 300;
        }

        #app-frame {
            display: none;
            width: 100%; height: 100vh; border: none;
        }

        /* 修改後的返回按鈕：無底色、僅線條 */
        #back-btn {
            position: fixed; 
            top: 20px; 
            left: 20px;
            display: none; 
            padding: 8px 18px;
            background: transparent; /* 移除底色 */
            border: 1px solid var(--text-muted); /* 僅保留細線條 */
            color: var(--text-muted); 
            border-radius: 20px;
            cursor: pointer; 
            z-index: 100;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        #back-btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: rgba(162, 210, 255, 0.05); /* 滑過時僅透出一點點色彩 */
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>FINAL FANTASY XIV Tools</h1>
        <div class="subtitle">做好玩的小工具</div>
        
        <div class="btn-group">
            <button class="nav-btn" onclick="loadApp('https://kisugi0009-ffxiv-richmaker.hf.space')">發家致富計算機</button>
            <button class="nav-btn" style="opacity: 0.4; cursor: default;">還沒生出來ᕕ( ᐛ )ᕗ</button>
        </div>

        <div class="footer-signature">
            Developed by @鳳凰 時偃
        </div>
    </div>

    <button id="back-btn" onclick="goHome()">BACK TO MENU</button>
    <iframe id="app-frame" src="" sandbox="allow-forms allow-modals allow-popups allow-same-origin allow-scripts allow-downloads"></iframe>

    <script>
        const menu = document.getElementById('menu-container');
        const frame = document.getElementById('app-frame');
        const backBtn = document.getElementById('back-btn');

        function loadApp(url) {
            menu.style.display = 'none';
            frame.style.display = 'block';
            backBtn.style.display = 'block';
            frame.src = url;
        }

        function goHome() {
            menu.style.display = 'flex';
            frame.style.display = 'none';
            backBtn.style.display = 'none';
            frame.src = '';
        }
    </script>
</body>
</html>
