    <title>FF14 發家致富計算機</title>
    <style>
        /* 讓網頁滿版，不出現捲軸 */

            width: 100%; 
            height: 100vh; 
            border: none; 
        }

</head>
<body>
    <iframe 
        src="https://huggingface.co/spaces/Kisugi0009/ffxiv_richmaker?embed=true"
