<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF XIV Tools</title>
    <style>
        :root {
            --accent-color: #a2d2ff;
            --bg-dark: #0e1117;
            --text-muted: #8b949e;
            --signature-color: rgba(162, 210, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-dark);
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            color: var(--accent-color);
            overflow: hidden;
        }

        #menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(180deg, #161b22 0%, #0e1117 100%);
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 10px; /* 恢復英文質感的寬間距 */
            margin-bottom: 10px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 50px;
            letter-spacing: 5px; /* 副標題也保持呼吸感 */
        }

        /* 關鍵：實作推擠特效的容器 */
        .btn-group { 
            display: flex; 
            gap: 20px; 
            transition: all 0.5s ease; /* 容器間距變化的平滑度 */
            z-index: 10;
        }

        .nav-btn {
            padding: 15px 35px;
            border: 1.5px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px; /* 讓中文按鈕也有一點英文的疏離美 */
            border-radius: 30px; /* 讓框不要太方正，改用膠囊型設計 */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }

        /* 關鍵：Hover 時產生的動態特效 */
        .nav-btn:hover {
            background: rgba(162, 210, 255, 0.15);
            box-shadow: 0 0 20px rgba(162, 210, 255, 0.3);
            transform: scale(1.1); /* 放大自己 */
            padding-left: 45px; /* 增加內距，產生視覺上的推擠感 */
            padding-right: 45px;
        }

        /* 當按鈕群組被 hover 時，增加整體間距產生推擠鄰居的效果 */
        .btn-group:hover {
            gap: 40px; 
        }

        .footer-signature {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            color: var(--signature-color);
            letter-spacing: 1px;
            font-weight: 300;
        }

        #app-frame {
            display: none;
            width: 100%; height: 100vh; border: none;
        }

        #back-btn {
            position: fixed; top: 20px; left: 20px;
            display: none; padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--text-muted);
            color: var(--text-muted); 
            border-radius: 20px;
            cursor: pointer; z-index: 100;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>FF XIV Tools</h1>
        <div class="subtitle">做好玩的小工具</div>
        
        <div class="btn-group">
            <button class="nav-btn" onclick="loadApp('https://kisugi0009-ffxiv-richmaker.hf.space')">發家致富計算機</button>
            <button class="nav-btn" style="opacity: 0.4; cursor: default;">未來的小工具</button>
        </div>

        <div class="footer-signature">
            Developed by @鳳凰 時偃
        </div>
    </div>

    <button id="back-btn" onclick="goHome()">← BACK TO MENU</button>
    <iframe id="app-frame" src="" sandbox="allow-forms allow-modals allow-popups allow-same-origin allow-scripts allow-downloads"></iframe>

    <script>
        const menu = document.getElementById('menu-container');
        const frame = document.getElementById('app-frame');
        const backBtn = document.getElementById('back-btn');

        function loadApp(url) {
            menu.style.display = 'none';
            frame.style.display = 'block';
            backBtn.style.display = 'block';
            frame.src = url;
        }

        function goHome() {
            menu.style.display = 'flex';
            frame.style.display = 'none';
            backBtn.style.display = 'none';
            frame.src = '';
        }
    </script>
</body>
</html>
